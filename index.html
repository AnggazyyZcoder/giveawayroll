<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Drip Client - Buy Key">
  <!-- Security Headers via meta -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://api.jsonbin.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src * data:; connect-src https://api.jsonbin.io;">
  <meta name="referrer" content="no-referrer">
  <title>Drip Client - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

  <!-- Particle Background -->
  <canvas id="particles-canvas"></canvas>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-orb loading-orb-1"></div>
    <div class="loading-orb loading-orb-2"></div>
    <div class="loading-logo-wrap"></div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">INITIALIZING SYSTEM</div>
  </div>

  <!-- Auth Section -->
  <div id="auth-section" class="auth-page" style="display:none">
    <div class="auth-card">
      <div class="auth-logo-wrap">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg"
             alt="Drip Client Logo" class="auth-logo"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect fill=%22%237c3aed%22 width=%2264%22 height=%2264%22 rx=%2212%22/><text x=%2232%22 y=%2244%22 text-anchor=%22middle%22 font-size=%2228%22 fill=%22white%22>D</text></svg>'">
        <div class="auth-title">Login To Dashboard</div>
        <div class="auth-sub">Masuk ke akun Drip Client kamu</div>
      </div>

      <form id="login-form" autocomplete="off" novalidate>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user" style="margin-right:6px;color:var(--primary-light)"></i>Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="login-username" class="form-input" placeholder="Masukan username kamu" maxlength="30" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock" style="margin-right:6px;color:var(--primary-light)"></i>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="login-password" class="form-input" placeholder="Masukan password kamu" maxlength="50" autocomplete="off">
            <button type="button" class="eye-toggle"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember-me">
            <span>Ingat Saya</span>
          </label>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div class="auth-footer" style="margin-top:18px">
        Tidak punya akun?
        <a href="register.html" class="auth-link">Daftar Sekarang</a>
      </div>

      <!-- Security note -->
      <div style="margin-top:16px;padding:10px 14px;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:8px;display:flex;align-items:center;gap:8px">
        <i class="fas fa-shield-alt" style="color:var(--primary-light);font-size:12px"></i>
        <span style="font-size:11px;color:var(--text-muted)">Koneksi aman & terenkripsi. Data kamu terlindungi.</span>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
