<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client - Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" type="image/jpeg">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
  <!-- Particles Background -->
  <div id="particles-js"></div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-ring loading-ring-3"></div>
    <div class="loading-ring loading-ring-2"></div>
    <div class="loading-ring loading-ring-1"></div>
    <div class="loading-logo" id="loadingLogo">
      <span class="loading-letter" style="animation-delay:0.1s">D</span>
      <span class="loading-letter" style="animation-delay:0.2s">R</span>
      <span class="loading-letter" style="animation-delay:0.3s">I</span>
      <span class="loading-letter" style="animation-delay:0.4s">P</span>
      <span class="loading-letter" style="animation-delay:0.6s; font-size: 1.5rem; opacity: 0.5; color: var(--text-muted);">&nbsp;</span>
      <span class="loading-letter" style="animation-delay:0.7s">C</span>
      <span class="loading-letter" style="animation-delay:0.8s">L</span>
      <span class="loading-letter" style="animation-delay:0.9s">I</span>
      <span class="loading-letter" style="animation-delay:1.0s">E</span>
      <span class="loading-letter" style="animation-delay:1.1s">N</span>
      <span class="loading-letter" style="animation-delay:1.2s">T</span>
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Initializing System...</div>
  </div>

  <!-- Main Content -->
  <div class="main-wrapper" style="display:none;" id="mainContent">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
          <span class="brand-name">DRIP CLIENT</span>
        </div>
        <h1 class="auth-title">Login To Dashboard</h1>
        <p class="auth-subtitle">Masukkan kredensial akun Anda untuk melanjutkan</p>

        <div id="loginAlert"></div>

        <div class="form-group" style="position:relative;">
          <label class="form-label"><i class="fa-solid fa-user" style="margin-right:6px;"></i> Username</label>
          <input type="text" id="loginUsername" class="form-input" placeholder="Masukkan username..." autocomplete="username" maxlength="50">
        </div>

        <div class="form-group" style="position:relative;">
          <label class="form-label"><i class="fa-solid fa-lock" style="margin-right:6px;"></i> Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password..." autocomplete="current-password" maxlength="100" style="padding-right:48px;">
          <span class="input-icon" onclick="togglePassword('loginPassword', this)">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            Ingat Saya
          </label>
          <a href="register.html" class="auth-link">Tidak punya akun? <strong>Daftar</strong></a>
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>

        <div class="auth-footer" style="margin-top:20px;">
          <a href="admin.html" class="auth-link" style="font-size:12px; color: var(--text-muted);">
            <i class="fa-solid fa-shield-halved"></i> Admin Panel
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    initParticles();
    initLoadingScreen(() => {
      document.getElementById('mainContent').style.display = 'block';
    });

    // Enter key support
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
