<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client – Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <canvas id="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="loading-logo-img" alt="Drip Client">
      <div class="loading-title"></div>
      <div class="loading-subtitle">Buy Key · Premium Access</div>
      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
        <div class="auth-logo-title">DRIP CLIENT</div>
      </div>
      <div class="auth-title">
        <i class="fas fa-lock" style="color:var(--purple-bright);margin-right:8px;"></i>
        Login To Dashboard
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-user" style="margin-right:6px;"></i>Username</label>
        <input type="text" class="form-input" id="login-username" placeholder="Masukan username...">
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock" style="margin-right:6px;"></i>Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="login-password" placeholder="Masukan password...">
          <button class="input-eye" id="toggle-login-pass" type="button" title="Tampilkan/Sembunyikan Password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-check">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember Me</label>
      </div>

      <button class="btn-primary" id="login-btn" type="button">
        <i class="fas fa-sign-in-alt"></i> LOGIN
      </button>

      <div class="auth-footer" style="margin-top:16px;">
        Tidak punya akun? <a href="register.html">Daftar Sekarang</a>
      </div>

      <div style="text-align:center;margin-top:16px;">
        <a href="admin.html" style="font-size:12px;color:var(--text-muted);text-decoration:none;transition:color 0.2s;">
          <i class="fas fa-cog" style="margin-right:4px;"></i>Admin Panel
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="script.js"></script>
</body>
</html>
