<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="Drip Client - Buy Key Platform">
  <title>Drip Client | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">

  <!-- Particle Background -->
  <canvas id="particle-canvas"></canvas>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="loading-logo-img" alt="Drip Client">
    </div>
    <div class="loading-title">
      <span class="letter">D</span>
      <span class="letter">R</span>
      <span class="letter">I</span>
      <span class="letter">P</span>
      <span class="letter space" style="display:inline-block;width:16px;"></span>
      <span class="letter">C</span>
      <span class="letter">L</span>
      <span class="letter">I</span>
      <span class="letter">E</span>
      <span class="letter">N</span>
      <span class="letter">T</span>
    </div>
    <div class="loading-sub">Buy Key Platform</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- Login Content -->
  <div id="auth-content" class="auth-page hidden" style="display:flex;">
    <div class="auth-card">
      <div class="auth-logo-wrap">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="auth-logo-img" alt="Logo">
        <div>
          <div class="auth-brand">DRIP CLIENT</div>
          <div class="auth-title">Login To <span>Dashboard</span></div>
        </div>
      </div>

      <form id="login-form" autocomplete="off">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Username</label>
          <div class="input-wrap">
            <input type="text" id="login-username" class="form-input" placeholder="Masukan username..." maxlength="20" autocomplete="off" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" class="form-input" placeholder="Masukan password..." maxlength="50" autocomplete="new-password" required>
            <button type="button" class="input-icon" data-toggle-pw="login-password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="remember-me">
          <input type="checkbox" id="remember-me">
          <label for="remember-me">Remember Me</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-primary" id="login-btn">
          <i class="fas fa-sign-in-alt"></i> LOGIN
        </button>
      </form>

      <div class="auth-footer" style="margin-top:20px;">
        Tidak punya akun? <a href="register.html">Daftar Sekarang</a>
      </div>

      <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>Secured · XSS Protected · Encrypted</span>
      </div>
    </div>
  </div>

  <!-- Notify Container -->
  <div id="notify-container" class="custom-notify"></div>

  <script src="script.js"></script>
  <style>
    .hidden { display: none !important; }
    #auth-content { opacity: 0; animation: fadeInUp 0.7s 0.2s forwards; }
  </style>
</body>
</html>
