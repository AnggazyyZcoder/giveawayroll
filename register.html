<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client - Register</title>
  <link rel="icon" href="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Logo" class="loading-logo">
    <div class="loading-title"></div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Initializing System...</div>
  </div>

  <!-- Main Content -->
  <div id="main-content" style="display:none" class="main-content">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo-wrap">
          <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" class="auth-logo">
          <div class="auth-title"><i class="fas fa-user-plus" style="color:#8b00e0;margin-right:8px"></i>Buat Akun Baru</div>
          <div class="auth-subtitle">Daftar sekarang untuk akses Drip Client</div>
        </div>

        <form id="register-form" autocomplete="off" novalidate>
          <!-- Honeypot -->
          <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">

          <div class="form-group">
            <label class="form-label"><i class="fas fa-user" style="margin-right:6px"></i>Username</label>
            <input
              type="text"
              id="reg-username"
              class="form-control"
              placeholder="Minimal 3 karakter..."
              autocomplete="off"
              maxlength="30"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label"><i class="fas fa-lock" style="margin-right:6px"></i>Password</label>
            <div class="input-icon-wrap">
              <input
                type="password"
                id="reg-password"
                class="form-control"
                placeholder="Minimal 6 karakter..."
                autocomplete="new-password"
                maxlength="100"
                required
              >
              <i class="fas fa-eye input-eye"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label"><i class="fas fa-lock" style="margin-right:6px"></i>Konfirmasi Password</label>
            <div class="input-icon-wrap">
              <input
                type="password"
                id="reg-confirm"
                class="form-control"
                placeholder="Ulangi password..."
                autocomplete="new-password"
                maxlength="100"
                required
              >
              <i class="fas fa-eye input-eye"></i>
            </div>
          </div>

          <div style="margin-bottom:24px">
            <div class="auth-link" style="text-align:center">
              Sudah punya akun? <a href="index.html">Login</a>
            </div>
          </div>

          <button type="submit" id="register-btn" class="btn-primary">
            <i class="fas fa-user-plus"></i> Register
          </button>
        </form>

        <div style="margin-top:20px;text-align:center;padding-top:16px;border-top:1px solid rgba(139,0,224,0.2)">
          <div style="font-size:0.75rem;color:var(--text-muted);font-family:var(--font-mono)">
            <i class="fas fa-shield-halved" style="color:#8b00e0;margin-right:6px"></i>
            Data Anda aman & terenkripsi
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="script.js"></script>
  <script>initRegister();</script>
</body>
</html>
