<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client - Register</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" type="image/jpeg">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
  <!-- Particles Background -->
  <div id="particles-js"></div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-ring loading-ring-3"></div>
    <div class="loading-ring loading-ring-2"></div>
    <div class="loading-ring loading-ring-1"></div>
    <div class="loading-logo">
      <span class="loading-letter" style="animation-delay:0.1s">D</span>
      <span class="loading-letter" style="animation-delay:0.2s">R</span>
      <span class="loading-letter" style="animation-delay:0.3s">I</span>
      <span class="loading-letter" style="animation-delay:0.4s">P</span>
      <span class="loading-letter" style="animation-delay:0.6s; font-size: 1.5rem; opacity: 0.5;">&nbsp;</span>
      <span class="loading-letter" style="animation-delay:0.7s">C</span>
      <span class="loading-letter" style="animation-delay:0.8s">L</span>
      <span class="loading-letter" style="animation-delay:0.9s">I</span>
      <span class="loading-letter" style="animation-delay:1.0s">E</span>
      <span class="loading-letter" style="animation-delay:1.1s">N</span>
      <span class="loading-letter" style="animation-delay:1.2s">T</span>
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- Main Content -->
  <div class="main-wrapper" style="display:none;" id="mainContent">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
          <span class="brand-name">DRIP CLIENT</span>
        </div>
        <h1 class="auth-title">Buat Akun Baru</h1>
        <p class="auth-subtitle">Daftarkan akun Anda untuk mulai berbelanja</p>

        <div id="registerAlert"></div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-user" style="margin-right:6px;"></i> Username</label>
          <input type="text" id="regUsername" class="form-input" placeholder="Buat username unik..." maxlength="30" autocomplete="username">
        </div>

        <div class="form-group" style="position:relative;">
          <label class="form-label"><i class="fa-solid fa-lock" style="margin-right:6px;"></i> Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Buat password kuat..." style="padding-right:48px;" maxlength="100" autocomplete="new-password">
          <span class="input-icon" onclick="togglePassword('regPassword', this)">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

        <div class="form-group" style="position:relative;">
          <label class="form-label"><i class="fa-solid fa-lock" style="margin-right:6px;"></i> Konfirmasi Password</label>
          <input type="password" id="regPasswordConfirm" class="form-input" placeholder="Ulangi password..." style="padding-right:48px;" maxlength="100" autocomplete="new-password">
          <span class="input-icon" onclick="togglePassword('regPasswordConfirm', this)">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-brands fa-whatsapp" style="margin-right:6px;color:#25d366;"></i> Nomor WhatsApp</label>
          <input type="text" id="regPhone" class="form-input" placeholder="Contoh: 08123456789..." maxlength="15" autocomplete="tel">
        </div>

        <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">
          <i class="fa-solid fa-user-plus"></i> Buat Akun
        </button>

        <div class="auth-footer">
          Sudah punya akun? <a href="index.html" class="auth-link"><strong>Login Sekarang</strong></a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    initParticles();
    initLoadingScreen(() => {
      document.getElementById('mainContent').style.display = 'block';
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doRegister();
    });
  </script>
</body>
</html>
