<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client | Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">

  <canvas id="particle-canvas"></canvas>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="loading-logo-img" alt="Drip Client">
    </div>
    <div class="loading-title">
      <span class="letter">D</span><span class="letter">R</span><span class="letter">I</span><span class="letter">P</span>
      <span class="letter space" style="display:inline-block;width:16px;"></span>
      <span class="letter">C</span><span class="letter">L</span><span class="letter">I</span><span class="letter">E</span><span class="letter">N</span><span class="letter">T</span>
    </div>
    <div class="loading-sub">Create Account</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  </div>

  <!-- Register Content -->
  <div id="auth-content" class="auth-page hidden" style="display:flex;">
    <div class="auth-card">
      <div class="auth-logo-wrap">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="auth-logo-img" alt="Logo">
        <div>
          <div class="auth-brand">DRIP CLIENT</div>
          <div class="auth-title">Buat <span>Akun Baru</span></div>
        </div>
      </div>

      <form id="register-form" autocomplete="off">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Username</label>
          <div class="input-wrap">
            <input type="text" id="reg-username" class="form-input" placeholder="Masukan username (3-20 karakter)" maxlength="20" autocomplete="off" required>
          </div>
          <small style="color:var(--gray-400);font-size:11px;margin-top:4px;display:block;">Huruf, angka, dan underscore saja</small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" class="form-input" placeholder="Minimal 6 karakter" maxlength="50" autocomplete="new-password" required>
            <button type="button" class="input-icon" data-toggle-pw="reg-password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Konfirmasi Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-confirm" class="form-input" placeholder="Ulangi password" maxlength="50" autocomplete="new-password" required>
            <button type="button" class="input-icon" data-toggle-pw="reg-confirm">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="register-btn">
          <i class="fas fa-user-plus"></i> DAFTAR SEKARANG
        </button>
      </form>

      <div class="auth-footer" style="margin-top:20px;">
        Sudah punya akun? <a href="index.html">Login Sekarang</a>
      </div>

      <div class="security-badge">
        <i class="fas fa-shield-alt"></i>
        <span>Data Aman · Terenkripsi · XSS Protected</span>
      </div>
    </div>
  </div>

  <div id="notify-container" class="custom-notify"></div>
  <script src="script.js"></script>
  <style>
    .hidden { display: none !important; }
    #auth-content { opacity: 0; animation: fadeInUp 0.7s 0.2s forwards; }
  </style>
</body>
</html>
