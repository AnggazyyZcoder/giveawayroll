<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drip Client – Register</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="icon" href="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" type="image/jpeg"/>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="loading-logo-img" alt="Drip Client"/>
      <div class="loading-title-chars" id="loading-chars"></div>
      <div class="loading-subtitle">Create Account</div>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- AUTH AREA -->
  <div class="auth-page" id="auth-area" style="display:none;">
    <div class="auth-card">
      <div class="auth-logo-section">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="auth-logo" alt="Drip Client"/>
        <div class="auth-title">DRIP CLIENT</div>
        <div class="auth-subtitle">Create New Account</div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-user" style="margin-right:6px;color:var(--purple-light)"></i>Username</label>
        <div style="position:relative;">
          <input type="text" id="reg-username" class="form-control" placeholder="Buat username unik..." autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope" style="margin-right:6px;color:var(--purple-light)"></i>Email (Opsional)</label>
        <div style="position:relative;">
          <input type="email" id="reg-email" class="form-control" placeholder="Email kamu..." autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock" style="margin-right:6px;color:var(--purple-light)"></i>Password</label>
        <div style="position:relative;">
          <input type="password" id="reg-password" class="form-control" placeholder="Minimal 6 karakter..." autocomplete="new-password"/>
          <span class="input-icon input-group-label" onclick="togglePass('reg-password','eye-reg1')">
            <i class="fas fa-eye" id="eye-reg1"></i>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock" style="margin-right:6px;color:var(--purple-light)"></i>Konfirmasi Password</label>
        <div style="position:relative;">
          <input type="password" id="reg-password2" class="form-control" placeholder="Ulangi password..." autocomplete="new-password"/>
          <span class="input-icon input-group-label" onclick="togglePass('reg-password2','eye-reg2')">
            <i class="fas fa-eye" id="eye-reg2"></i>
          </span>
        </div>
      </div>

      <div class="notice">
        <i class="fas fa-shield-alt"></i>
        Data kamu dienkripsi dan aman. Jangan bagikan password kepada siapapun.
      </div>

      <button class="btn-primary" id="reg-btn" onclick="doRegister()">
        <i class="fas fa-user-plus" style="margin-right:8px;"></i>DAFTAR SEKARANG
      </button>

      <div id="reg-msg" style="margin-top:12px;text-align:center;font-size:13px;"></div>

      <div class="auth-footer">
        Sudah punya akun? <a href="index.html" class="auth-link"><strong>Login</strong></a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    initParticles();
    startLoadingScreen('auth-area');
  </script>
</body>
</html>
