<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drip Client – Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="register">
  <canvas id="bg-canvas"></canvas>
  <div class="bg-overlay"></div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" class="loading-logo-img" alt="Drip Client">
      <div class="loading-title"></div>
      <div class="loading-subtitle">Buy Key · Premium Access</div>
      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- REGISTER PAGE -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
        <div class="auth-logo-title">DRIP CLIENT</div>
      </div>
      <div class="auth-title">
        <i class="fas fa-user-plus" style="color:var(--purple-bright);margin-right:8px;"></i>
        Buat Akun Baru
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-user" style="margin-right:6px;"></i>Username</label>
        <input type="text" class="form-input" id="reg-username" placeholder="Buat username unik...">
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock" style="margin-right:6px;"></i>Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="reg-password" placeholder="Buat password (min 6 karakter)...">
          <button class="input-eye" id="toggle-reg-pass" type="button" title="Tampilkan/Sembunyikan">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="fas fa-shield-alt" style="margin-right:6px;"></i>Konfirmasi Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="reg-confirm-password" placeholder="Ulangi password...">
          <button class="input-eye" id="toggle-reg-confirm" type="button" title="Tampilkan/Sembunyikan">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div style="background:rgba(45,0,96,0.3);border:1px solid var(--border-purple);border-radius:8px;padding:12px;margin-bottom:20px;font-size:13px;color:var(--text-muted);">
        <i class="fas fa-info-circle" style="color:var(--purple-bright);margin-right:6px;"></i>
        Username min 3 karakter · Password min 6 karakter
      </div>

      <button class="btn-primary" id="register-btn" type="button">
        <i class="fas fa-user-plus"></i> DAFTAR SEKARANG
      </button>

      <div class="auth-footer" style="margin-top:16px;">
        Sudah punya akun? <a href="index.html">Login Disini</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="script.js"></script>
</body>
</html>
